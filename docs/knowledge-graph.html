<head>

<title>claude-codex-sync — 知识图谱 / Knowledge Graph</title>
<style>
:root{
  --surface:#fcfcfb; --page:#f9f9f7; --ink:#0b0b0b; --ink-2:#52514e; --muted:#898781;
  --grid:#e1e0d9; --axis:#c3c2b7; --border:rgba(11,11,11,.10);
  --c1:#2a78d6; --c2:#1baf7a; --c3:#eda100; --c4:#008300; --c5:#4a3aa7; --c6:#e34948; --c7:#e87ba4;
}
@media (prefers-color-scheme: dark){
  :root{
    --surface:#1a1a19; --page:#0d0d0d; --ink:#ffffff; --ink-2:#c3c2b7; --muted:#898781;
    --grid:#2c2c2a; --axis:#383835; --border:rgba(255,255,255,.10);
    --c1:#3987e5; --c2:#199e70; --c3:#c98500; --c4:#008300; --c5:#9085e9; --c6:#e66767; --c7:#d55181;
  }
}
*{box-sizing:border-box}
body{margin:0;background:var(--page);color:var(--ink);font:14px/1.6 system-ui,-apple-system,"Segoe UI",sans-serif}
.wrap{max-width:1200px;margin:0 auto;padding:24px 20px 60px}
.hrow{display:flex;justify-content:space-between;align-items:flex-start;gap:12px}
header h1{font-size:22px;margin:0 0 4px}
header .sub{color:var(--ink-2);margin:0 0 6px}
header .meta{color:var(--muted);font-size:12px}
a{color:var(--c1)}
#langBtn{flex:none;font:600 13px/1 system-ui,-apple-system,"Segoe UI",sans-serif;background:var(--surface);border:1px solid var(--border);border-radius:99px;padding:8px 14px;color:var(--ink);cursor:pointer}
#langBtn:hover{border-color:var(--c1);color:var(--c1)}
.tiles{display:grid;grid-template-columns:repeat(auto-fit,minmax(120px,1fr));gap:10px;margin:18px 0}
.tile{background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:12px 14px}
.tile .v{font-size:24px;font-weight:650}
.tile .k{color:var(--muted);font-size:12px}
.panel{background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:14px}
.controls{display:flex;flex-wrap:wrap;gap:14px;align-items:center;margin-bottom:10px;font-size:13px;color:var(--ink-2)}
.controls label{display:flex;gap:6px;align-items:center;cursor:pointer}
.controls button{font:inherit;background:none;border:1px solid var(--border);border-radius:6px;padding:2px 10px;color:var(--ink-2);cursor:pointer}
.legend{display:flex;flex-wrap:wrap;gap:10px 16px;font-size:12px;color:var(--ink-2)}
.legend .sw{display:inline-block;width:10px;height:10px;border-radius:3px;margin-right:5px;vertical-align:-1px}
.gwrap{display:flex;gap:14px;align-items:stretch}
#graph{flex:1;min-width:0;height:560px;border:1px solid var(--border);border-radius:10px;background:var(--surface);cursor:grab;touch-action:none;overflow:hidden}
#graph:active{cursor:grabbing}
#detail{width:300px;flex:none;border:1px solid var(--border);border-radius:10px;background:var(--surface);padding:14px;height:560px;overflow:auto;font-size:13px}
#detail h3{margin:0 0 6px;font-size:14px;word-break:break-all}
#detail .path{color:var(--muted);font-size:12px;word-break:break-all}
#detail .badge{display:inline-block;font-size:11px;border:1px solid var(--border);border-radius:99px;padding:1px 8px;margin:6px 6px 0 0;color:var(--ink-2)}
#detail .sum{margin:10px 0;color:var(--ink)}
#detail .eh{color:var(--muted);font-size:12px;margin:12px 0 4px}
#detail .el{margin:0;padding:0;list-style:none}
#detail .el li{padding:3px 0;border-bottom:1px dashed var(--grid);cursor:pointer;color:var(--ink-2);word-break:break-all}
#detail .el li:hover{color:var(--c1)}
#detail .el .et{color:var(--muted);font-size:11px}
.hint{color:var(--muted);font-size:12px;margin-top:8px}
#tip{position:fixed;pointer-events:none;background:var(--ink);color:var(--page);font-size:12px;padding:4px 8px;border-radius:6px;opacity:0;transition:opacity .12s;z-index:9;max-width:320px}
h2.sec{font-size:17px;margin:34px 0 12px}
.layers{display:grid;grid-template-columns:repeat(auto-fill,minmax(260px,1fr));gap:12px}
.lcard{background:var(--surface);border:1px solid var(--border);border-left:4px solid var(--axis);border-radius:10px;padding:12px 14px}
.lcard h3{margin:0 0 4px;font-size:14px}
.lcard p{margin:0 0 8px;color:var(--ink-2);font-size:12px}
.lcard ul{margin:0;padding-left:18px;font-size:12px;color:var(--ink-2)}
.lcard code{font-family:ui-monospace,Menlo,monospace;font-size:11px}
.tour{counter-reset:step;list-style:none;margin:0;padding:0}
.tour li{position:relative;padding:12px 14px 12px 52px;background:var(--surface);border:1px solid var(--border);border-radius:10px;margin-bottom:10px}
.tour li::before{counter-increment:step;content:counter(step);position:absolute;left:14px;top:14px;width:24px;height:24px;border-radius:50%;background:var(--c1);color:#fff;font-size:12px;font-weight:650;display:flex;align-items:center;justify-content:center}
.tour h3{margin:0 0 4px;font-size:14px}
.tour p{margin:0;color:var(--ink-2);font-size:13px}
.tour .chips{margin-top:6px}
.tour .chip{display:inline-block;font-size:11px;font-family:ui-monospace,Menlo,monospace;border:1px solid var(--border);border-radius:6px;padding:1px 7px;margin:2px 4px 0 0;color:var(--ink-2);cursor:pointer}
.tour .chip:hover{color:var(--c1);border-color:var(--c1)}
.tour details{margin-top:6px}
.tour summary{cursor:pointer;color:var(--muted);font-size:12px}
.tour .lesson{color:var(--ink-2);font-size:12px;margin:6px 0 0}
footer{margin-top:40px;color:var(--muted);font-size:12px}
@media (max-width:860px){.gwrap{flex-direction:column}#detail{width:auto;height:auto;max-height:320px}}
</style>

业务逻辑:扫描 Claude home 与项目上下文、渲染 Markdown 产物、编排项目模式操作,以及备份恢复与清理的计划-执行逻辑。","nodeIds":["file:src/scan.ts","file:src/render.ts","file:src/project.ts","file:src/restore.ts","file:src/clean.ts"]},{"id":"layer:foundation","name":"写入基础层","description":"被全部核心模块依赖的底层基础设施,定义 Finding/Operation 等核心类型,实现托管块(BEGIN/END 标记)的插入与删除,以及带自动备份和 dry-run 的操作执行器。","nodeIds":["file:src/write.ts"]},{"id":"layer:test","name":"测试层","description":"基于 Vitest 的单元、集成与端到端测试,在临时目录中验证扫描、渲染、写入、恢复、清理、CLI 全流程以及安装/卸载脚本的行为。","nodeIds":["file:tests/write.test.ts","file:tests/scan.test.ts","file:tests/render.test.ts","file:tests/project.test.ts","file:tests/restore.test.ts","file:tests/clean.test.ts","file:tests/cli.test.ts","file:tests/scripts.test.ts"]},{"id":"layer:infrastructure","name":"安装脚本层","description":"一键安装与卸载的 shell 脚本,负责构建 CLI、在 ~/.local/bin 生成 launcher,以及带安全检查(脏仓库拒绝删除)的卸载流程。","nodeIds":["file:install.sh","file:uninstall.sh"]},{"id":"layer:documentation","name":"文档层","description":"中英双语的用户文档(README)与内部原理文档(HOW-IT-WORKS),以及 README 图示功能的设计规格与实施计划。","nodeIds":["document:README.md","document:README.zh-CN.md","document:docs/HOW-IT-WORKS.md","document:docs/HOW-IT-WORKS.zh-CN.md","document:docs/superpowers/plans/2026-07-02-readme-diagrams.md","document:docs/superpowers/specs/2026-07-02-readme-diagrams-design.md"]},{"id":"layer:config","name":"配置层","description":"项目构建与工具链配置:npm 包清单、TypeScript 编译配置、Vitest 测试配置,以及 understand-anything 分析工具的配置与忽略规则。","nodeIds":["config:package.json","config:config/tsconfig.json","file:vitest.config.ts","config:.understand-anything/config.json","file:.understand-anything/.understandignore"]}],"tour":[{"order":1,"title":"项目概览","description":"从 README 开始:claude-codex-sync 是一个本地 CLI 工具,把 Claude Code 的全局指令、rules 和项目记忆\"翻译\"成 OpenAI Codex 可读的 Markdown,全程不触碰 Claude 的状态,也不写入 Codex 的原生记忆数据库。README 用 13 个章节讲清了同步范围(CLAUDE.md、rules、memory)、安全边界(settings/MCP/hooks 只扫描不迁移)以及 scan/plan/apply/restore/clean 等命令的用法。中文版 README.zh-CN.md 与英文版逐节对应,读完任意一份即可带着'它同步什么、绝不动什么'这两个问题进入代码。","nodeIds":["document:README.md","document:README.zh-CN.md"]},{"order":2,"title":"CLI 入口与命令编排","description":"src/index.ts 是整个工具的入口和总指挥:runCli 解析 scan/plan/apply/project/report/restore/clean 七个子命令,再调度下层的扫描、渲染、写入模块。它是全图 fan-out 最高的文件(依赖全部 6 个核心模块),README 中的每一条命令都能在这里找到对应的分支——比如 apply 必须带 --yes 才会真正写盘,这正是安全模型的第一道闸门。注意 buildGlobalOperations 只负责\"构建操作列表\",执行被推迟到统一的执行器,这个\"先计划、后执行\"模式会贯穿整个项目。","nodeIds":["file:src/index.ts"],"languageLesson":"ESM 环境下没有 CommonJS 的 require.main === module,index.ts 用 isMainModule 判断\"是被直接运行还是被 import\"——这让同一个文件既能作为 CLI 入口,又能被测试直接 import runCli 做端到端验证,无需 spawn 子进程。"},{"order":3,"title":"写入基础层:托管块与操作执行器","description":"src/write.ts 是全图 fan-in 最高的文件(被 9 处依赖),所有核心模块都建立在它之上。它定义了 Finding/Operation/ExecutionResult 等贯穿全项目的核心类型,并实现两件关键的事:一是托管块(managed block)——用 BEGIN/END 标记在 ~/.codex/AGENTS.md 中圈出\"归本工具管\"的区域,upsertManagedBlock/removeManagedBlock 只改标记之间的内容,用户手写部分秋毫无犯;二是 executeOperations 执行器,自动为每个被改动的文件生成带时间戳的备份,并原生支持 dry-run。理解了这一层,后面所有模块的安全承诺就都有了着落。","nodeIds":["file:src/write.ts"],"languageLesson":"这是典型的\"类型先行\"设计:Operation 是纯数据(描述要写什么),执行是唯一的副作用出口 executeOperations。TypeScript 的 interface 让\"计划\"成为可序列化、可测试、可预览的一等公民——plan 命令展示的就是这些 Operation,apply 只是把同一份数据交给执行器。"},{"order":4,"title":"扫描层:发现 Claude 的上下文","description":"同步流水线的第一步是\"看\":src/scan.ts 解析 Claude home、Codex home(支持 CODEX_HOME 覆盖)与项目路径,递归收集 rules 下的 Markdown 和项目 memory 目录。它最微妙的部分是复刻 Claude Code 的项目路径编码规则(claudeProjectIdFromMemoryDir / encodeProjectRootForClaudeMemory),据此把磁盘上的 memory 目录匹配回具体项目。对 settings、MCP、hooks、skills、plugins 这些不可安全迁移的配置,它只生成 report-only 的 Finding——这正是 README 中\"扫描但绝不迁移\"承诺在代码里的落点。","nodeIds":["file:src/scan.ts"]},{"order":5,"title":"渲染层:生成 Codex 可读的 Markdown","description":"扫描到的原始上下文由 src/render.ts 转换成最终文本:AGENTS 托管块正文、带内容预览和告警的 memory 索引、同步报告以及 manifest 清单,全部输出文本都出自这一个模块。它依赖上一步 write.ts 的类型定义,但自身不做任何文件写入——纯函数式的\"数据进、字符串出\",所以 render.test.ts 可以直接断言输出内容而无需碰文件系统。previewFence 等细节还处理了 Markdown 代码围栏嵌套的转义问题,防止 memory 内容\"越狱\"污染索引结构。","nodeIds":["file:src/render.ts"]},{"order":6,"title":"项目模式编排","description":"全局同步由 index.ts 直接编排,而项目级同步(claude-codex-sync project <path>)复杂到需要独立模块:src/project.ts 的 buildProjectOperations 把前两步学到的扫描与渲染串成完整流水线——扫描项目和 Claude home、按第 4 步的编码规则匹配 auto memory 目录、渲染 AGENTS.override.md 与 memory 索引,最后组装出包含 .gitignore 更新在内的完整 Operation 列表。它是\"先计划、后执行\"模式的最佳范例:整个函数只产出数据,不产生副作用,--apply 与否只决定这份计划交不交给执行器。","nodeIds":["file:src/project.ts"]},{"order":7,"title":"安全网:备份恢复与清理","description":"第 3 步中执行器写盘前自动备份,这里是备份的\"消费端\"。src/restore.ts 在全局与项目的同步目标目录中扫描带时间戳后缀的备份文件,为每个目标挑出最新一份并生成恢复用的写入操作——这就是 restore 命令的全部逻辑。src/clean.ts 则负责优雅退场:删除 AGENTS.md 中的托管块(手写内容保留)、清除生成的记忆目录与报告、只剔除工具自己写入的 .gitignore 条目,可选 --purge-backups 清空备份。两者都遵循计划-执行两阶段,默认 dry-run,与 README 的\"撤销与卸载\"章节一一对应。","nodeIds":["file:src/restore.ts","file:src/clean.ts"]},{"order":8,"title":"测试策略:从单元到端到端","description":"一个改写用户 home 目录的工具,测试就是它的信誉。测试层按核心模块一一对应:write.test.ts 覆盖托管块的追加/替换/删除、不平衡标记抛错、body 内标记中和防注入等边界情况;project.test.ts 在临时目录中搭建假项目与假 home,验证生成产物的完整内容;cli.test.ts 则在临时 HOME 中端到端地跑 runCli,确认 scan 只读不写、apply 必须 --yes。三个层次共同守住\"没让你写就绝不写\"的承诺。","nodeIds":["file:tests/write.test.ts","file:tests/project.test.ts","file:tests/cli.test.ts"],"languageLesson":"Vitest 测试普遍使用 mkdtemp 创建临时目录并覆盖 HOME/CODEX_HOME 环境变量,把\"操作真实文件系统\"的危险测试隔离进沙箱——对文件系统重度工具,这比 mock fs 更真实也更可靠,是值得复用的测试模式。"},{"order":9,"title":"内部原理文档","description":"看完代码再回头读 docs/HOW-IT-WORKS.md,会有\"对号入座\"的乐趣:它分 7 节讲解同步流水线(对应第 4-6 步的 scan→render→write)、托管区块机制(第 3 步)、memory 索引(第 5 步)、只报告式配置扫描(第 4 步)与安全模型(第 7 步)。这份文档是给贡献者和深度用户的\"设计说明书\",中文译本逐节对应。如果说 README 讲\"是什么、怎么用\",HOW-IT-WORKS 讲的是\"为什么这样设计\"。","nodeIds":["document:docs/HOW-IT-WORKS.md","document:docs/HOW-IT-WORKS.zh-CN.md"]},{"order":10,"title":"安装、卸载与脚本测试","description":"install.sh 执行 npm install 与构建,在 ~/.local/bin 生成指向 dist/index.js 的 launcher,且刻意不修改任何 shell rc 文件——安全边界从代码延伸到了安装体验。uninstall.sh 同样克制:删除 launcher 和仓库目录,但默认保留所有已同步内容与备份,遇到未提交更改的仓库还会拒绝删除(需 --force)。连这两个 shell 脚本都有 Vitest 集成测试(scripts.test.ts)覆盖,验证构建产物可执行、脏仓库拒删等场景。","nodeIds":["file:install.sh","file:uninstall.sh","file:tests/scripts.test.ts"],"languageLesson":"launcher 脚本模式:安装器不把二进制复制到 PATH,而是生成一个几行的转发脚本指向仓库内的 dist/index.js。这样 git pull + 重新构建即完成升级,卸载也只需删一个小文件,PATH 中不留任何过期拷贝。"},{"order":11,"title":"构建与工具链配置","description":"最后看支撑这一切的工具链:package.json 声明 ESM 模块类型、bin 入口(claude-codex-sync → dist/index.js)与 Node >= 20 的引擎约束;config/tsconfig.json 启用 strict 模式和 NodeNext 模块解析,把 src 编译到 dist 并生成声明文件;vitest.config.ts 则指定收集 tests/**/*.test.ts 在 node 环境运行。第 2 步 index.ts 的 ESM 入口判断、第 8 步的测试组织方式,根源都在这三个文件里。","nodeIds":["config:package.json","config:config/tsconfig.json","file:vitest.config.ts"],"languageLesson":"package.json 的 \"type\": \"module\" 会让全仓库 .js 文件按 ESM 解析,搭配 tsconfig 的 NodeNext 意味着 import 必须写完整扩展名(如 './scan.js')。这是现代 Node CLI 的标准组合,也解释了为什么临时脚本在此仓库内必须用 .cjs 后缀才能使用 require。"},{"order":12,"title":"文档也走 TDD:superpowers 工作流","description":"收尾看一个有趣的工程实践:docs/superpowers 下保留了 README 图示功能的设计规格与实施计划——spec 定义了 4 张 Mermaid 图的内容与放置锚点,plan 则按 TDD 顺序拆成 6 个任务:先写\"图示存在性\"的回归测试,再逐一为中英文文档添加图,最后整体验证。连文档改动都先写测试再动手,这解释了 git 历史中那些 'tighten diagram guard anchors' 之类的提交,也展示了这个项目一以贯之的严谨风格。","nodeIds":["document:docs/superpowers/specs/2026-07-02-readme-diagrams-design.md","document:docs/superpowers/plans/2026-07-02-readme-diagrams.md"]}]};
const EN = {"project":{"description":"A local CLI tool that safely migrates Claude Code context (global instructions, rules, project memory) into Codex-readable Markdown"},"layers":{"layer:cli":{"name":"CLI Entry Layer","description":"Command-line entry and subcommand orchestration: parses scan/plan/apply/project/report/restore/clean and dispatches to the scanning, rendering, and writing modules below."},"layer:core":{"name":"Sync Core Layer","description":"Core business logic of the sync pipeline: scanning Claude home and project context, rendering Markdown artifacts, orchestrating project-mode operations, plus the plan-then-execute logic for backup restore and cleanup."},"layer:foundation":{"name":"Write Foundation Layer","description":"Low-level infrastructure every core module depends on: defines core types like Finding/Operation, implements managed-block (BEGIN/END markers) insertion and removal, and the operation executor with automatic backups and dry-run."},"layer:test":{"name":"Test Layer","description":"Vitest-based unit, integration, and end-to-end tests that verify scanning, rendering, writing, restore, cleanup, the full CLI flow, and the install/uninstall scripts inside temporary directories."},"layer:infrastructure":{"name":"Install Scripts Layer","description":"One-shot install and uninstall shell scripts: build the CLI, generate a launcher in ~/.local/bin, and an uninstall flow with safety checks (refuses to delete a dirty repo)."},"layer:documentation":{"name":"Documentation Layer","description":"Bilingual user docs (README) and internals docs (HOW-IT-WORKS), plus the design spec and implementation plan for the README diagram feature."},"layer:config":{"name":"Configuration Layer","description":"Project build and toolchain configuration: npm package manifest, TypeScript compiler config, Vitest test config, and the understand-anything analyzer config and ignore rules."}},"nodes":{"file:src/clean.ts":"Cleanup module: removes sync artifacts in a two-phase plan-then-execute manner — strips the managed block from AGENTS.md, deletes generated memory directories and report files, removes tool-written .gitignore entries, and optionally purges backups. Covers both the global Codex home and project scopes.","file:src/restore.ts":"Backup-restore module: scans sync target directories (global and project) for timestamp-suffixed backup files, picks the newest backup per target file, and builds the write Operations used for restoring.","file:src/write.ts":"Write-infrastructure module: defines core types like Finding/Operation/ExecutionResult, implements managed-block (BEGIN/END markers) insertion, replacement, and removal, plus an operation executor with automatic backups and dry-run support. The bottom layer that clean, restore, and others all depend on.","file:tests/clean.test.ts":"Vitest tests for the clean module: verify global and project cleanup plans, including preserving hand-written AGENTS.md content, removing only the tool's own .gitignore entries, purging backups on demand, and keeping a .codex directory that still holds unrelated files.","file:tests/restore.test.ts":"Vitest tests for the restore module: verify newest-backup selection per target (including conflict suffixes on identical timestamps), recursive scanning of nested directories, ignoring non-backup files, and restore behavior in dry-run vs apply modes.","file:tests/write.test.ts":"Vitest tests for the write module: cover managed-block append/replace/remove, throwing on duplicate or unbalanced markers, neutralizing markers inside the body to prevent injection, and the executor's dry-run, backup dedup, and skip-unchanged behaviors.","function:src/clean.ts:planManagedBlockRemoval":"Reads the target file and dry-computes managed-block removal; if the file exists and contains the block, emits a remove-managed-block cleanup action.","function:src/clean.ts:planGlobalClean":"Builds the cleanup plan for the global Codex home: remove the AGENTS.md managed block, delete generated memory indexes and reports, and append backup-deletion actions when purgeBackups is on.","function:src/clean.ts:planProjectClean":"Builds the cleanup plan for a project directory: remove the AGENTS.md managed block, delete sync artifacts under .codex, strip tool-written entries from .gitignore, and schedule removal of the .codex directory when it would end up empty.","function:src/clean.ts:executeClean":"Executes the cleanup action list by type: recompute and write back content with the managed block removed (delete the file if empty), delete files/directories, filter .gitignore entries, remove empty directories, and return the list of items actually removed.","function:src/restore.ts:globalRestoreRoots":"Returns the list of root directories to scan for backups in global scope (the Codex home itself and its memory directory, the latter scanned recursively).","function:src/restore.ts:projectRestoreRoots":"Returns the list of root directories to scan for backups in project scope (the project root and its .codex directory).","function:src/restore.ts:collectBackupFiles":"Walks the filesystem under a single root (optionally recursive) and collects all backup file paths whose names match the backup-suffix pattern; silently returns an empty list when the directory does not exist.","function:src/restore.ts:findBackupFiles":"Aggregates all backup files under multiple restore roots and returns them sorted by path, used by the cleanup module's purge-backups feature.","function:src/restore.ts:findRestoreCandidates":"Groups backup files by their target file, uses lexicographic filename order to pick the newest backup per group, and produces a sorted list of restore candidates.","function:src/restore.ts:buildRestoreOperations":"Reads each restore candidate's backup content and builds the write-file Operation list to hand to executeOperations (restoring does not create new backups).","function:src/write.ts:readTextIfExists":"Reads a text file's content, returning undefined instead of throwing when the file does not exist; other errors propagate normally.","function:src/write.ts:copyWithUniqueBackupPath":"Copies the target file to a timestamp-suffixed backup; if a backup with the same timestamp already exists, appends an incrementing counter to avoid overwriting existing backups.","function:src/write.ts:findUniqueMarkerRange":"Locates the BEGIN/END marker positions of a named managed block in existing text; throws on duplicate blocks of the same name or unbalanced markers, guaranteeing a unique, well-formed block structure.","function:src/write.ts:upsertManagedBlock":"Inserts or replaces a named managed block in file content: appends to the end when absent, replaces in place when present while preserving surrounding hand-written content and blank lines.","function:src/write.ts:removeManagedBlock":"Deletes a named managed block from file content and stitches the surrounding hand-written content back together; returns undefined when the block is absent and throws on malformed markers.","function:src/write.ts:executeOperations":"The unified operation executor: dry-run mode only reports without touching disk; in apply mode it skips files whose content is unchanged, creates a unique backup before overwriting when needed, writes the new content, and returns the backup and unchanged lists.","function:tests/clean.test.ts:seedGlobal":"Test helper: seeds a temporary Codex home with an AGENTS.md containing a managed block, memory directories, reports, and backup files, simulating the global state after a full sync.","file:src/index.ts":"CLI entry point: parses the scan/plan/apply/project/report/restore/clean subcommands and orchestrates the scanning, rendering, and writing modules to sync Claude's global context into Codex-readable artifacts.","file:src/render.ts":"Markdown rendering layer, responsible for generating all output text: the AGENTS managed-block body, memory indexes (with previews and warnings), sync reports, and the manifest.","file:tests/cli.test.ts":"End-to-end Vitest tests for runCli, run inside a temporary HOME: verify help output, rejection of unknown commands, apply requiring --yes, scan being read-only, and the full global sync flow.","file:tests/render.test.ts":"Unit tests for the render module, covering global/project AGENTS body rendering, memory indexes with preview limits, unmatched-memory diagnostics, and report and manifest output.","function:src/index.ts:printHelp":"Prints the CLI usage text, listing all subcommands and behavioral notes for restore/clean.","function:src/index.ts:buildGlobalOperations":"Builds the write-operation plan for a global sync: scans Claude home, renders the AGENTS managed block, rules copies, per-project memory indexes, the report and manifest, and aggregates findings.","function:src/index.ts:buildGlobalScanOutput":"Runs a read-only scan, aggregating Claude-home findings and memory directory info into the JSON output of the scan command.","function:src/index.ts:parseProjectArgs":"Parses the project subcommand's path and --dry-run/--apply flags, validating unknown flags and mutually exclusive combinations, returning error messages.","function:src/index.ts:runCli":"The main CLI dispatcher: routes subcommands to scan, plan, apply, project sync, report, restore, and clean logic and returns the process exit code; exported so tests can call it directly.","function:src/index.ts:isMainModule":"Determines whether the current file is being executed directly by comparing the realpath'd module URL with argv[1], deciding whether to auto-run runCli.","function:src/render.ts:renderGlobalAgentsBody":"Renders the global AGENTS.md managed-block body, embedding the CLAUDE.md source content and routing to the synced rules and memory indexes.","function:src/render.ts:renderProjectAgentsBody":"Renders the project-level AGENTS managed-block body: concatenates each instruction source block, annotates the memory index path and match status, and appends a disclaimer that memory is historical context only.","function:src/render.ts:previewFence":"Computes a code fence longer than any backtick run already present in the preview text, preventing nested Markdown fences from being terminated early.","function:src/render.ts:listMarkdownFiles":"Recursively walks a directory and returns a sorted list of all .md file paths.","function:src/render.ts:parseMarkdownFile":"Streams a single Markdown file, extracting the heading outline and a content preview bounded by byte/line limits, and records whether it was truncated.","function:src/render.ts:renderMemoryIndexWithFindings":"Generates the memory-index Markdown for a Claude memory directory: per-file metadata, heading outline, truncated preview, and warnings, while emitting the corresponding findings list.","function:src/render.ts:renderUnmatchedProjectMemoryIndex":"When a project matches no Claude auto-memory directory, renders a diagnostic index recording the expected project ID and the IDs actually discovered, for manual verification.","function:src/render.ts:renderReport":"Renders the operation list and findings into a Markdown sync report, with a placeholder note when the lists are empty.","function:src/render.ts:renderManifest":"Generates the JSON sync manifest recording the generation time and artifact paths, letting restore/clean track files the sync produced.","file:src/project.ts":"Core orchestration module for project mode: scans the project and Claude home, matches the auto-memory directory, renders AGENTS.override.md, the memory index, report, and manifest, and assembles the complete write-operation list (including .gitignore updates).","function:src/project.ts:assertExistingDirectory":"Validates that the given project path exists and is a directory, throwing a contextual error otherwise — fail-fast input validation before building operations.","function:src/project.ts:buildProjectOperations":"The main project-mode flow: reads project instruction files in parallel, matches the Claude auto-memory directory, calls the render layer to produce AGENTS.override.md, the memory index, report, and manifest, and returns the array of file-write operations to execute.","file:src/scan.ts":"Scanning layer: resolves Claude/Codex home and in-project paths, matches project memory directories using Claude Code's encoding rules, recursively collects rules Markdown and memory directories, and emits report-only findings for non-migratable items like skills, plugins, hooks, and settings.","function:src/scan.ts:resolveHomes":"Resolves the absolute paths of Claude home and Codex home from the HOME environment variable (and optional CODEX_HOME).","function:src/scan.ts:resolveProjectPaths":"Expands a project root into the absolute paths of each output file, including AGENTS.override.md and the memory index, report, and manifest under .codex.","function:src/scan.ts:claudeProjectIdFromMemoryDir":"Extracts the parent directory name from a Claude memory directory path, yielding the Claude Code project ID.","function:src/scan.ts:encodeProjectRootForClaudeMemory":"Encodes an absolute project path into a memory project ID using Claude Code's rules (slashes, underscores, dots, and spaces all become hyphens), for exact matching of auto-memory directories.","function:src/scan.ts:getGlobalMemoryIndexPath":"Computes the output path of a project's memory index file in global mode from the Codex home and memory directory, with a sanitized file name.","function:src/scan.ts:findClaudeMemoryDirForProject":"Encodes the project root into a project ID and looks up the matching Claude auto-memory directory in the collected memory directory list.","function:src/scan.ts:collectMarkdownFiles":"Recursively walks a directory collecting all .md files, returned sorted; returns an empty array when the directory does not exist — used to collect rules and other Markdown resources.","function:src/scan.ts:collectMemoryDirs":"Iterates the Claude projects directory, collecting entries that actually contain a memory subdirectory, sorted before returning.","function:src/scan.ts:collectReportOnlyFindings":"Probes each non-auto-migratable candidate — skills, plugins, hooks, permissions, settings, MCP config — checking existence, whether directories are non-empty, and whether JSON parses, emitting findings with category and action (report-only/ignore).","function:src/scan.ts:scanClaudeHome":"Scans ~/.claude: locates the global CLAUDE.md, recursively collects rules Markdown, gathers per-project memory directories, and aggregates report-only findings for skills/plugins/hooks/settings; degrades gracefully without error when home is missing.","function:src/scan.ts:scanProject":"Scans a project root: collects instruction files like CLAUDE.md, CLAUDE.local.md, and .claude/CLAUDE.md, and emits report-only findings for project-level skills, plugins, hooks, settings.local.json, .mcp.json, etc.","file:tests/project.test.ts":"Integration tests for project mode: build a fake project and fake home in temp directories and verify the generated AGENTS.override.md, .gitignore, manifest, memory index, and report — covering matched/unmatched memory, repeated apply leaving no stray backups, and erroring on nonexistent paths.","file:tests/scan.test.ts":"Unit tests for the scanning layer: verify home and project path resolution, CODEX_HOME override, Claude memory project-ID encoding rules (underscores/dots/spaces), and both scanners' recognition of instruction files, rules, memory, and report-only config items.","document:README.md":"The project's main English documentation — 13 sections covering features, sync scope, safety boundaries, install/uninstall, usage, project mode, and how it works; the entry point for new users of claude-codex-sync.","document:README.zh-CN.md":"The Simplified Chinese translation of README.md, with sections mirroring the English version one-to-one (what it does, sync scope, safety boundaries, installation, usage, undo and uninstall), giving Chinese users equivalent project docs.","file:install.sh":"One-shot install script: runs npm install and the build, then generates a launcher pointing to dist/index.js in ~/.local/bin (overridable via CLAUDE_CODEX_SYNC_BIN_DIR), warns when that directory is missing from PATH, and never modifies shell rc files.","function:install.sh:main":"Install main flow: locate the repo directory, npm install and build, write the executable launcher script, then check whether the bin directory is on PATH and notify the user.","config:package.json":"npm package manifest: declares the ESM module type, the bin entry (claude-codex-sync → dist/index.js), build/typecheck/test scripts (tsc + vitest), a Node >= 20 engine constraint, and the published file list.","file:uninstall.sh":"One-shot uninstall script: removes the launcher from PATH and deletes the repo directory, while keeping all synced content and backups by default; refuses to delete a repo with uncommitted changes unless --force is given.","function:uninstall.sh:main":"Uninstall main flow: parse --force, check the repo for uncommitted changes (refuse to delete if dirty), remove the launcher, note that sync artifacts are kept by default, then delete the whole repo directory.","file:.understand-anything/.understandignore":"Ignore-rule template for the understand-anything analyzer, listing optional exclusion patterns in .gitignore syntax (test files, docs, .worktrees, etc.); all rules are currently commented out, i.e., nothing is excluded.","config:.understand-anything/config.json":"Configuration file for the understand-anything knowledge-graph tool, containing a single setting: analysis output language set to Chinese (zh).","config:config/tsconfig.json":"TypeScript compiler configuration: strict mode with NodeNext module resolution, compiling sources under ../src into ../dist with declaration files and sourcemaps.","document:docs/HOW-IT-WORKS.md":"English internals document in 7 sections: the sync pipeline, the managed-blocks mechanism, memory indexes, report-only config scanning, write locations, the safety model, and native memory import.","document:docs/HOW-IT-WORKS.zh-CN.md":"The Chinese counterpart of HOW-IT-WORKS.md, with sections mirroring the English version, explaining the sync flow, managed blocks, the memory index, the safety model, and native memory import.","document:docs/superpowers/plans/2026-07-02-readme-diagrams.md":"Implementation plan for the README diagram feature, split into 6 tasks in TDD order: first write regression tests for diagram existence, then add Mermaid diagrams to the English and Chinese README and HOW-IT-WORKS docs, and finish with full verification and a manual rendering check.","document:docs/superpowers/specs/2026-07-02-readme-diagrams-design.md":"Design spec for the README diagrams: defines the content and placement anchors of 4 diagrams (what-it-does, how-it-works, usage flow, and HOW-IT-WORKS internals detail), plus rendering notes and acceptance criteria.","file:tests/scripts.test.ts":"Vitest integration tests for install.sh and uninstall.sh: verify the installer builds the CLI and produces an executable launcher, and the uninstaller's behavior across three scenarios — keeping sync artifacts, refusing a dirty repo, and --force deletion.","function:tests/scripts.test.ts:makeFakeRepo":"Test helper that builds a fake git repo containing uninstall.sh in a temp directory (init + commit) and creates an executable fake launcher, returning repoDir, binDir, and the launcher path for uninstall tests.","file:vitest.config.ts":"Vitest configuration: collects test files under tests/**/*.test.ts and runs them in the node environment."},"tour":{"1":{"title":"Project Overview","description":"Start with the README: claude-codex-sync is a local CLI tool that 'translates' Claude Code's global instructions, rules, and project memory into Markdown that OpenAI Codex can read — never touching Claude's state or writing to Codex's native memory database. The README's 13 sections cover the sync scope (CLAUDE.md, rules, memory), the safety boundary (settings/MCP/hooks are scanned but never migrated), and the scan/plan/apply/restore/clean commands. The Chinese README.zh-CN.md mirrors it section by section; read either one and enter the code holding two questions: what does it sync, and what will it never touch?"},"2":{"title":"CLI Entry and Command Orchestration","description":"src/index.ts is the entry point and conductor: runCli parses the seven subcommands (scan/plan/apply/project/report/restore/clean) and dispatches to the scanning, rendering, and writing modules. It has the highest fan-out in the graph (depending on all 6 core modules), and every command in the README maps to a branch here — e.g. apply only writes to disk with --yes, the first gate of the safety model. Note that buildGlobalOperations only builds the operation list; execution is deferred to a unified executor. This plan-then-execute pattern runs through the entire project.","lesson":"ESM has no CommonJS require.main === module, so index.ts uses isMainModule to tell 'run directly' from 'being imported' — letting the same file serve as the CLI entry while tests import runCli directly for end-to-end verification without spawning child processes."},"3":{"title":"Write Foundation: Managed Blocks and the Operation Executor","description":"src/write.ts has the highest fan-in in the graph (9 dependents); every core module builds on it. It defines the project-wide core types (Finding/Operation/ExecutionResult) and implements two key things. First, managed blocks — BEGIN/END markers that fence off the tool's own region inside ~/.codex/AGENTS.md; upsertManagedBlock/removeManagedBlock only touch content between the markers, leaving hand-written content untouched. Second, the executeOperations executor, which automatically creates timestamped backups for every modified file and natively supports dry-run. Understand this layer and every module's safety promise has a foundation.","lesson":"A textbook types-first design: an Operation is pure data (describing what to write) and executeOperations is the single side-effect exit. TypeScript interfaces make the 'plan' a serializable, testable, previewable first-class citizen — the plan command displays these Operations, and apply merely hands the same data to the executor."},"4":{"title":"Scanning Layer: Discovering Claude's Context","description":"The pipeline's first step is looking: src/scan.ts resolves Claude home, Codex home (CODEX_HOME override supported), and project paths, recursively collecting rules Markdown and project memory directories. Its subtlest part replicates Claude Code's project-path encoding rules (claudeProjectIdFromMemoryDir / encodeProjectRootForClaudeMemory) to match on-disk memory directories back to concrete projects. For settings, MCP, hooks, skills, and plugins — which cannot be migrated safely — it only emits report-only Findings: the code-level landing of the README promise to 'scan but never migrate'."},"5":{"title":"Rendering Layer: Generating Codex-Readable Markdown","description":"src/render.ts turns the scanned raw context into final text: the AGENTS managed-block body, memory indexes with content previews and warnings, sync reports, and the manifest — all output text comes from this one module. It depends on write.ts for type definitions but performs no file writes itself: purely functional, data in, strings out, which is why render.test.ts can assert on output without touching the filesystem. Details like previewFence handle nested Markdown code-fence escaping, preventing memory content from 'escaping' and corrupting the index structure."},"6":{"title":"Project-Mode Orchestration","description":"Global sync is orchestrated directly by index.ts, but project-level sync (claude-codex-sync project <path>) is complex enough to warrant its own module: buildProjectOperations in src/project.ts chains the scanning and rendering from the previous steps into a full pipeline — scan the project and Claude home, match the auto-memory directory using step 4's encoding rules, render AGENTS.override.md and the memory index, and assemble the complete Operation list including .gitignore updates. It is the best showcase of plan-then-execute: the whole function only produces data with zero side effects; --apply merely decides whether the plan reaches the executor."},"7":{"title":"Safety Net: Backup Restore and Cleanup","description":"In step 3 the executor backs up before writing; here is the consuming side. src/restore.ts scans the sync target directories (global and project) for timestamp-suffixed backups, picks the newest per target, and builds the restore write operations — that is the entire restore command. src/clean.ts handles the graceful exit: remove the managed block from AGENTS.md (hand-written content preserved), delete generated memory directories and reports, strip only the tool's own .gitignore entries, with optional --purge-backups. Both follow plan-then-execute and default to dry-run, matching the README's 'undo and uninstall' section one-to-one."},"8":{"title":"Test Strategy: From Unit to End-to-End","description":"For a tool that rewrites your home directory, tests are its reputation. The test layer maps one-to-one to core modules: write.test.ts covers managed-block append/replace/remove, unbalanced-marker errors, and in-body marker neutralization against injection; project.test.ts builds fake projects and fake homes in temp directories to verify complete generated artifacts; cli.test.ts runs runCli end-to-end in a temporary HOME, confirming scan is read-only and apply demands --yes. Three levels jointly guard the promise: nothing is written unless you asked.","lesson":"The Vitest tests consistently use mkdtemp to create temp directories and override HOME/CODEX_HOME, sandboxing dangerous real-filesystem tests. For filesystem-heavy tools this is more realistic and reliable than mocking fs — a testing pattern worth reusing."},"9":{"title":"Internals Documentation","description":"After the code, rereading docs/HOW-IT-WORKS.md is a matching game: its 7 sections cover the sync pipeline (steps 4–6: scan→render→write), the managed-block mechanism (step 3), the memory index (step 5), report-only config scanning (step 4), and the safety model (step 7). It is the design manual for contributors and power users, with a section-by-section Chinese translation. If the README says what it is and how to use it, HOW-IT-WORKS explains why it is designed this way."},"10":{"title":"Install, Uninstall, and Script Tests","description":"install.sh runs npm install and the build, generates a launcher in ~/.local/bin pointing at dist/index.js, and deliberately never edits shell rc files — the safety boundary extends from code into the install experience. uninstall.sh is equally restrained: it removes the launcher and the repo directory but keeps all synced content and backups by default, and refuses to delete a repo with uncommitted changes (--force required). Even these two shell scripts have Vitest integration coverage (scripts.test.ts) verifying the built artifact is executable and dirty repos are refused.","lesson":"The launcher-script pattern: the installer doesn't copy a binary onto PATH but generates a few-line forwarding script pointing at dist/index.js inside the repo. Upgrading is just git pull + rebuild, uninstalling deletes one small file, and no stale copies linger on PATH."},"11":{"title":"Build and Toolchain Configuration","description":"Finally, the toolchain underneath it all: package.json declares the ESM module type, the bin entry (claude-codex-sync → dist/index.js), and a Node >= 20 engine constraint; config/tsconfig.json enables strict mode and NodeNext module resolution, compiling src into dist with declaration files; vitest.config.ts collects tests/**/*.test.ts and runs them in the node environment. Step 2's ESM entry detection and step 8's test organization both trace their roots to these three files.","lesson":"\"type\": \"module\" in package.json makes every .js file in the repo parse as ESM; combined with tsconfig's NodeNext it means imports must carry full extensions (e.g. './scan.js'). This is the standard modern Node CLI combo — and explains why ad-hoc scripts inside this repo need a .cjs suffix to use require."},"12":{"title":"Docs Do TDD Too: the superpowers Workflow","description":"Close with a fun engineering practice: docs/superpowers preserves the design spec and implementation plan for the README diagram feature — the spec defines 4 Mermaid diagrams with content and placement anchors, and the plan splits the work into 6 tasks in TDD order: write a regression test for diagram existence first, then add diagrams to the English and Chinese docs one by one, and verify everything at the end. Even documentation changes start with a test, which explains commits like 'tighten diagram guard anchors' in the git history — and shows the project's consistently rigorous style."}},"tags":{"清理":"cleanup","计划-执行模式":"plan-execute pattern","文件系统":"filesystem","cli-逻辑":"cli-logic","备份恢复":"backup-restore","文件扫描":"file-scanning","核心基础设施":"core-infrastructure","托管块":"managed-block","备份":"backup","文件写入":"file-writing","集成测试":"integration-test","边界情况":"edge-cases","计划生成":"plan-building","全局作用域":"global-scope","项目作用域":"project-scope","执行器":"executor","路径配置":"path-config","递归遍历":"recursive-walk","去重选优":"dedup-selection","操作构造":"operation-building","文件读取":"file-reading","错误处理":"error-handling","冲突处理":"conflict-handling","解析":"parsing","校验":"validation","核心逻辑":"core-logic","删除":"removal","测试夹具":"test-fixture","命令编排":"command-orchestration","参数解析":"arg-parsing","渲染":"rendering","模板":"template","扫描":"scanning","只读":"read-only","命令分发":"command-dispatch","边界处理":"boundary-handling","文件遍历":"file-walking","诊断":"diagnostics","报告":"report","编排":"orchestration","项目模式":"project-mode","操作构建":"operation-building","快速失败":"fail-fast","核心流程":"core-flow","异步":"async","路径解析":"path-resolution","环境变量":"env-vars","编码规则":"encoding-rules","兼容性":"compatibility","全局模式":"global-mode","匹配":"matching","递归":"recursion","发现收集":"finding-collection","安全边界":"safety-boundary","单元测试":"unit-test","使用指南":"user-guide","中文文档":"chinese-docs","翻译":"translation","分析工具":"analyzer","语言设置":"language-setting","编译配置":"compiler-config","架构说明":"architecture-notes","安全模型":"safety-model","实施计划":"implementation-plan","设计规格":"design-spec","安装卸载":"install-uninstall"}};
const UI = {

    title: 'claude-codex-sync · 代码库知识图谱',
    meta: (d,c,l) => `由 <a href="https://github.com/Egonex-AI/Understand-Anything" rel="noopener">understand-anything</a> 静态导出 · 分析时间 ${d} · commit ${c} · ${l}`,
    tiles: ['文件','节点','关系边','架构层','导览步骤'],
    fnToggle: '显示函数节点', reset: '重置视图',
    hint: '点击图中节点查看详情。<br><br>拖拽节点可调整布局,滚轮缩放,拖拽空白处平移。<br><br>节点颜色 = 架构层,节点大小 = 连接数。',
    secLayers: '架构分层', secTour: '导览(12 步读懂这个仓库)',
    outE: '出边', inE: '入边', cx: '复杂度', lesson: '语言笔记',
    foot: '本页面为零依赖的静态 HTML,由 understand-anything 生成的 knowledge-graph.json 渲染而成;数据快照见页首 commit。',

    meta: (d,c,l) => `Static export from <a href="https://github.com/Egonex-AI/Understand-Anything" rel="noopener">understand-anything</a> · analyzed ${d} · commit ${c} · ${l}`,
    tiles: ['Files','Nodes','Edges','Layers','Tour steps'],
    fnToggle: 'Show function nodes', reset: 'Reset view',
    hint: 'Click a node to see details.<br><br>Drag nodes to adjust the layout, scroll to zoom, drag the background to pan.<br><br>Node color = architecture layer, node size = connection count.',
    secLayers: 'Architecture Layers', secTour: 'Guided Tour (12 steps through this repo)',
    outE: 'Outgoing', inE: 'Incoming', cx: 'Complexity', lesson: 'Language note',
    foot: 'A zero-dependency static HTML page rendered from the knowledge-graph.json produced by understand-anything; data snapshot at the commit shown above.',

  }
};
let lang = 'zh';
const S = () => UI[lang];
const nodeSummary = n => lang==='en' ? (EN.nodes[n.id] || n.summary || '') : (n.summary || '');
const layerName = l => lang==='en' && EN.layers[l.id] ? EN.layers[l.id].name : l.name;
const layerDesc = l => lang==='en' && EN.layers[l.id] ? EN.layers[l.id].description : l.description;
const tourTxt = s => lang==='en' && EN.tour[String(s.order)] ? EN.tour[String(s.order)] : {title:s.title, description:s.description, lesson:s.languageLesson};
const tagTxt = t => lang==='en' ? (EN.tags[t] || t) : t;
const projDesc = () => lang==='en' ? EN.project.description : G.project.description;

const LAYER_COLORS = ['var(--c1)','var(--c2)','var(--c3)','var(--c4)','var(--c5)','var(--c6)','var(--c7)'];
const layerIndex = {}; G.layers.forEach((l,i)=>layerIndex[l.id]=i);
const nodeLayer = {}; G.layers.forEach(l=>l.nodeIds.forEach(id=>nodeLayer[id]=l.id));
const fileByPath = {}; G.nodes.forEach(n=>{ if(n.type!=='function'&&n.type!=='class'&&n.filePath) fileByPath[n.filePath]=n.id; });
G.nodes.forEach(n=>{ if(!(n.id in nodeLayer) && n.filePath && fileByPath[n.filePath] in nodeLayer) nodeLayer[n.id]=nodeLayer[fileByPath[n.filePath]]; });
const colorOf = id => LAYER_COLORS[(layerIndex[nodeLayer[id]] ?? 0) % LAYER_COLORS.length];
const byId = {}; G.nodes.forEach(n=>byId[n.id]=n);
const fileLevel = G.nodes.filter(n=>n.type!=='function'&&n.type!=='class');

function renderChrome(){
  document.documentElement.lang = S().htmlLang;
  document.title = lang==='en' ? 'claude-codex-sync — Knowledge Graph' : 'claude-codex-sync — 知识图谱';
  document.getElementById('ptitle').textContent = S().title;
  document.getElementById('pdesc').textContent = projDesc();
  document.getElementById('pmeta').innerHTML = S().meta(G.project.analyzedAt.slice(0,10), G.project.gitCommitHash.slice(0,7), G.project.languages.join(' / '));
  document.getElementById('langBtn').textContent = S().langBtn;
  const vals=[fileLevel.length,G.nodes.length,G.edges.length,G.layers.length,G.tour.length];
  document.getElementById('tiles').innerHTML = S().tiles.map((k,i)=>`<div class="tile"><div class="v">${vals[i]}</div><div class="k">${k}</div></div>`).join('');
  document.getElementById('fnLabel').textContent = S().fnToggle;
  document.getElementById('resetBtn').textContent = S().reset;
  document.getElementById('legend').innerHTML = G.layers.map((l,i)=>`<span><span class="sw" style="background:${LAYER_COLORS[i]}"></span>${layerName(l)}</span>`).join('');
  document.getElementById('secLayers').textContent = S().secLayers;
  document.getElementById('secTour').textContent = S().secTour;
  document.getElementById('foot').textContent = S().foot;
  document.getElementById('layers').innerHTML = G.layers.map((l,i)=>`
    <div class="lcard" style="border-left-color:${LAYER_COLORS[i]}">
      <h3>${layerName(l)} <span style="color:var(--muted);font-weight:400">· ${l.nodeIds.length}</span></h3>
      <p>${layerDesc(l)}</p>
      <ul>${l.nodeIds.map(id=>`<li><code>${(byId[id]&&byId[id].filePath)||id}</code></li>`).join('')}</ul>
    </div>`).join('');
  document.getElementById('tour').innerHTML = G.tour.map(s=>{
    const t=tourTxt(s);
    return `<li><h3>${t.title}</h3><p>${t.description}</p>
    <div class="chips">${s.nodeIds.map(id=>`<span class="chip" data-focus="${id}">${(byId[id]&&byId[id].filePath)||id}</span>`).join('')}</div>
    ${t.lesson?`<details><summary>${S().lesson}</summary><p class="lesson">${t.lesson}</p></details>`:''}</li>`;
  }).join('');
  if(selected && byId[selected]){ const sn=SN.find(x=>x.id===selected); if(sn) showDetail(sn); }
  else document.getElementById('detail').innerHTML = `<p class="hint">${S().hint}</p>`;
}

// ---------- graph ----------
const svg = document.getElementById('graph');
const NS = 'http://www.w3.org/2000/svg';
let W = svg.clientWidth || 800, H = 560;
svg.setAttribute('viewBox', `0 0 ${W} ${H}`);
const root = document.createElementNS(NS,'g'); svg.appendChild(root);
const edgeG = document.createElementNS(NS,'g'); root.appendChild(edgeG);
const nodeG = document.createElementNS(NS,'g'); root.appendChild(nodeG);
let tx=0, ty=0, scale=1;
const applyT = ()=> root.setAttribute('transform',`translate(${tx},${ty}) scale(${scale})`);

let showFn = false, selected = null;
let SN=[], SE=[];

function buildSet(){
  const keep = new Set(G.nodes.filter(n=>showFn || (n.type!=='function'&&n.type!=='class')).map(n=>n.id));
  SN = G.nodes.filter(n=>keep.has(n.id)).map(n=>({ ...n, x:0, y:0, vx:0, vy:0, deg:0 }));
  const pos = {}; SN.forEach(n=>pos[n.id]=n);
  SE = G.edges.filter(e=>keep.has(e.source)&&keep.has(e.target)&&e.source!==e.target)
              .map(e=>({s:pos[e.source], t:pos[e.target], type:e.type}));
  SE.forEach(e=>{e.s.deg++;e.t.deg++;});
  const groups = {};
  SN.forEach(n=>{const k=layerIndex[nodeLayer[n.id]]??0;(groups[k]=groups[k]||[]).push(n);});
  Object.entries(groups).forEach(([k,ns])=>{
    const a0 = (k/G.layers.length)*Math.PI*2, cx = W/2+Math.cos(a0)*160, cy = H/2+Math.sin(a0)*130;
    ns.forEach((n,i)=>{const a=(i/ns.length)*Math.PI*2; n.x=cx+Math.cos(a)*(40+8*(i%3)); n.y=cy+Math.sin(a)*(40+8*(i%3));});
  });
}
function simulate(iter){
  const kRep = showFn? 1600: 2600, kSpr = 0.02, L = showFn? 70: 110;
  for(let it=0; it<iter; it++){
    const cool = 1 - it/iter;
    for(let i=0;i<SN.length;i++) for(let j=i+1;j<SN.length;j++){
      const a=SN[i], b=SN[j];
      let dx=a.x-b.x, dy=a.y-b.y, d2=dx*dx+dy*dy || 1, d=Math.sqrt(d2);
      const f = kRep/d2, fx=f*dx/d, fy=f*dy/d;
      a.vx+=fx; a.vy+=fy; b.vx-=fx; b.vy-=fy;
    }
    SE.forEach(e=>{
      let dx=e.t.x-e.s.x, dy=e.t.y-e.s.y, d=Math.sqrt(dx*dx+dy*dy)||1;
      const f=kSpr*(d-L), fx=f*dx/d, fy=f*dy/d;
      e.s.vx+=fx; e.s.vy+=fy; e.t.vx-=fx; e.t.vy-=fy;
    });
    SN.forEach(n=>{
      n.vx += (W/2-n.x)*0.003; n.vy += (H/2-n.y)*0.003;
      n.x += Math.max(-14,Math.min(14,n.vx))*cool; n.y += Math.max(-14,Math.min(14,n.vy))*cool;
      n.vx*=0.5; n.vy*=0.5;
    });
  }
}
const rOf = n => (n.type==='function'||n.type==='class') ? 4.5 : Math.min(16, 7+Math.sqrt(n.deg)*1.6);
const nameOf = n => n.type==='function'||n.type==='class' ? n.name : (n.filePath? n.filePath.split('/').pop() : n.name);

const tip = document.getElementById('tip');
function render(){
  edgeG.innerHTML=''; nodeG.innerHTML='';
  SE.forEach(e=>{
    const l=document.createElementNS(NS,'line');
    l.setAttribute('stroke','var(--axis)'); l.setAttribute('stroke-width','1'); l.setAttribute('opacity','.55');
    edgeG.appendChild(l); e.el=l;
  });
  SN.forEach(n=>{
    const g=document.createElementNS(NS,'g'); g.style.cursor='pointer';
    const c=document.createElementNS(NS,'circle');
    c.setAttribute('r',rOf(n)); c.setAttribute('fill',colorOf(n.id));
    c.setAttribute('stroke','var(--surface)'); c.setAttribute('stroke-width','2');
    const t=document.createElementNS(NS,'text');
    t.textContent=nameOf(n);
    t.setAttribute('font-size', n.type==='function'||n.type==='class'?'8.5':'10.5');
    t.setAttribute('fill','var(--ink-2)'); t.setAttribute('text-anchor','middle');
    g.appendChild(c); g.appendChild(t); nodeG.appendChild(g);
    n.cEl=c; n.tEl=t; n.gEl=g;
    g.addEventListener('pointerenter',()=>{tip.textContent=`${n.name} · ${n.type}`;tip.style.opacity=1;});
    g.addEventListener('pointermove',ev=>{tip.style.left=(ev.clientX+12)+'px';tip.style.top=(ev.clientY+12)+'px';});
    g.addEventListener('pointerleave',()=>tip.style.opacity=0);
    g.addEventListener('pointerdown',ev=>startDragNode(n,ev));
  });
  position();
}
function position(){
  SE.forEach(e=>{e.el.setAttribute('x1',e.s.x);e.el.setAttribute('y1',e.s.y);e.el.setAttribute('x2',e.t.x);e.el.setAttribute('y2',e.t.y);});
  SN.forEach(n=>{
    n.cEl.setAttribute('cx',n.x); n.cEl.setAttribute('cy',n.y);
    n.tEl.setAttribute('x',n.x); n.tEl.setAttribute('y',n.y+rOf(n)+10);
  });
}
let adjCache={};
function adj(id){ if(adjCache[id])return adjCache[id]; const s=new Set(); SE.forEach(e=>{if(e.s.id===id)s.add(e.t.id);if(e.t.id===id)s.add(e.s.id);}); return adjCache[id]=s; }
function highlight(id){
  SN.forEach(n=>{n.gEl.setAttribute('opacity', id && n.id!==id && !adj(id).has(n.id) ? .25 : 1);});
  SE.forEach(e=>{
    const on = id && (e.s.id===id || e.t.id===id);
    e.el.setAttribute('stroke', on? colorOf(id):'var(--axis)');
    e.el.setAttribute('stroke-width', on? '1.8':'1');
    e.el.setAttribute('opacity', id? (on? .95:.15):.55);
  });
}
function showDetail(n){
  selected=n.id; highlight(n.id);
  const outs=G.edges.filter(e=>e.source===n.id&&byId[e.target]);
  const ins=G.edges.filter(e=>e.target===n.id&&byId[e.source]);
  const li=(id,ty)=>`<li data-focus="${id}"><span class="et">${ty}</span> ${byId[id].name}</li>`;
  const layer=G.layers[layerIndex[nodeLayer[n.id]]??0];
  document.getElementById('detail').innerHTML=`
    <h3>${n.name}</h3>
    ${n.filePath?`<div class="path">${n.filePath}</div>`:''}
    <span class="badge">${n.type}</span><span class="badge" style="border-color:${colorOf(n.id)};color:${colorOf(n.id)}">${layerName(layer)}</span>
    ${n.complexity?`<span class="badge">${S().cx} ${n.complexity}</span>`:''}
    <p class="sum">${nodeSummary(n)}</p>
    ${n.tags&&n.tags.length?`<div>${n.tags.map(t=>`<span class="badge">${tagTxt(t)}</span>`).join('')}</div>`:''}
    ${outs.length?`<p class="eh">${S().outE} ${outs.length}</p><ul class="el">${outs.map(e=>li(e.target,e.type)).join('')}</ul>`:''}
    ${ins.length?`<p class="eh">${S().inE} ${ins.length}</p><ul class="el">${ins.map(e=>li(e.source,e.type)).join('')}</ul>`:''}`;
}
document.addEventListener('click',ev=>{
  const f=ev.target.closest('[data-focus]'); if(!f) return;
  const id=f.dataset.focus;
  if(!SN.find(x=>x.id===id) && byId[id]){ document.getElementById('fnToggle').checked=true; toggleFn(true); }
  const sn=SN.find(x=>x.id===id);
  if(sn){ showDetail(sn); document.getElementById('graph').scrollIntoView({behavior:'smooth',block:'center'}); }
});

let dragN=null, panning=false, px=0, py=0;
function startDragNode(n,ev){ dragN=n; ev.stopPropagation(); svg.setPointerCapture(ev.pointerId); showDetail(n); }
svg.addEventListener('pointerdown',ev=>{ if(!dragN){panning=true;px=ev.clientX;py=ev.clientY;} });
svg.addEventListener('pointermove',ev=>{
  if(dragN){ const p=toLocal(ev); dragN.x=p.x; dragN.y=p.y; position(); }
  else if(panning){ tx+=ev.clientX-px; ty+=ev.clientY-py; px=ev.clientX; py=ev.clientY; applyT(); }
});
window.addEventListener('pointerup',()=>{dragN=null;panning=false;});
svg.addEventListener('wheel',ev=>{
  ev.preventDefault();
  const k = ev.deltaY<0? 1.12: 1/1.12, r=svg.getBoundingClientRect();
  const mx=ev.clientX-r.left, my=ev.clientY-r.top;
  tx = mx-(mx-tx)*k; ty = my-(my-ty)*k; scale*=k; applyT();
},{passive:false});
svg.addEventListener('dblclick',()=>{selected=null;highlight(null);});
function toLocal(ev){ const r=svg.getBoundingClientRect(); return {x:(ev.clientX-r.left-tx)/scale, y:(ev.clientY-r.top-ty)/scale}; }

function toggleFn(v){ showFn=v; adjCache={}; buildSet(); simulate(showFn?260:320); render(); if(selected){const sn=SN.find(x=>x.id===selected); if(sn) showDetail(sn); else {selected=null; highlight(null);} } }
document.getElementById('fnToggle').addEventListener('change',ev=>toggleFn(ev.target.checked));
document.getElementById('resetBtn').addEventListener('click',()=>{tx=0;ty=0;scale=1;applyT();selected=null;highlight(null);
  document.getElementById('detail').innerHTML=`<p class="hint">${S().hint}</p>`;});
document.getElementById('langBtn').addEventListener('click',()=>{ lang = lang==='zh' ? 'en' : 'zh'; renderChrome(); });

buildSet(); simulate(320); render(); renderChrome();
window.addEventListener('resize',()=>{ const w=svg.clientWidth; if(w&&Math.abs(w-W)>60){W=w;svg.setAttribute('viewBox',`0 0 ${W} ${H}`);} });
</script>
</body>
